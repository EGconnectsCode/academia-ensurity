<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Academia Ensurity — Agent Training Platform</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #f4f6fa;
  --surface:   #ffffff;
  --surface2:  #f0f2f7;
  --border:    #e2e6ef;
  --text:      #1a2035;
  --text2:     #5a6480;
  --accent:    #1a56db;
  --accent-h:  #1246c0;
  --danger:    #e53e3e;
  --success:   #38a169;
  --shadow:    0 2px 16px rgba(0,0,0,.08);
  --radius:    12px;
  --transition: .2s ease;
}
[data-theme="dark"] {
  --bg:        #0f1117;
  --surface:   #1a1d27;
  --surface2:  #232736;
  --border:    #2d3245;
  --text:      #e8ecf8;
  --text2:     #8891b0;
  --accent:    #4f83f1;
  --accent-h:  #3c6fd6;
  --shadow:    0 2px 16px rgba(0,0,0,.4);
}
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

/* ===== TOPBAR ===== */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow);
}
.topbar-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.15rem; color: var(--text); text-decoration: none; }
.topbar-logo svg { width: 32px; height: 32px; }
.topbar-actions { display: flex; align-items: center; gap: 12px; }
.btn-icon {
  background: none; border: none; cursor: pointer; color: var(--text2);
  width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
  transition: background var(--transition), color var(--transition);
}
.btn-icon:hover { background: var(--surface2); color: var(--text); }
.lang-toggle {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  padding: 4px 10px; font-size: .8rem; font-weight: 600; cursor: pointer; color: var(--text2);
  transition: all var(--transition);
}
.lang-toggle:hover { color: var(--accent); border-color: var(--accent); }

/* ===== AUTH PANEL ===== */
#auth-section {
  min-height: calc(100vh - 60px);
  display: flex; align-items: center; justify-content: center;
  padding: 40px 20px;
}
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  width: 100%; max-width: 440px;
  padding: 40px;
}
.auth-card-logo {
  text-align: center; margin-bottom: 28px;
}
.auth-card-logo h1 { font-size: 1.5rem; font-weight: 700; color: var(--text); }
.auth-card-logo p  { font-size: .9rem; color: var(--text2); margin-top: 4px; }
.auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.auth-tab {
  flex: 1; padding: 10px; text-align: center; cursor: pointer;
  font-size: .9rem; font-weight: 600; color: var(--text2);
  border-bottom: 2px solid transparent; transition: all var(--transition);
}
.auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: .82rem; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
.form-group input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface2); color: var(--text); font-size: .95rem;
  transition: border-color var(--transition), box-shadow var(--transition);
  outline: none;
}
.form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,131,241,.15); }
.btn-primary {
  width: 100%; padding: 12px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-size: .95rem; font-weight: 600;
  cursor: pointer; transition: background var(--transition), transform var(--transition);
}
.btn-primary:hover { background: var(--accent-h); }
.btn-primary:active { transform: scale(.98); }
.btn-primary:disabled { opacity: .6; cursor: not-allowed; }
.auth-msg {
  margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: .85rem;
  display: none;
}
.auth-msg.error   { background: #fff0f0; color: var(--danger); border: 1px solid #fcc; display: block; }
.auth-msg.success { background: #f0fff4; color: var(--success); border: 1px solid #9ae6b4; display: block; }
[data-theme="dark"] .auth-msg.error   { background: #2d1515; border-color: #7b2d2d; }
[data-theme="dark"] .auth-msg.success { background: #162615; border-color: #2d7b3a; }
.forgot-link { font-size: .82rem; color: var(--accent); cursor: pointer; text-decoration: underline; margin-top: 6px; display: inline-block; }

/* ===== MODULE SELECTOR ===== */
#modules-section { display: none; padding: 32px 24px; max-width: 1000px; margin: 0 auto; }
.welcome-banner {
  background: linear-gradient(135deg, var(--accent), #6c48e0);
  color: #fff; border-radius: var(--radius); padding: 28px 32px; margin-bottom: 32px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
}
.welcome-banner h2 { font-size: 1.4rem; font-weight: 700; }
.welcome-banner p  { opacity: .85; margin-top: 4px; font-size: .9rem; }
.xp-badge {
  background: rgba(255,255,255,.2); border-radius: 10px; padding: 10px 20px;
  text-align: center; min-width: 100px;
}
.xp-badge .xp-num  { font-size: 1.6rem; font-weight: 800; }
.xp-badge .xp-label{ font-size: .75rem; opacity: .8; }
.section-title { font-size: 1rem; font-weight: 700; color: var(--text2); text-transform: uppercase;
  letter-spacing: .06em; margin-bottom: 16px; }
.modules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.module-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden; cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
  text-decoration: none; color: inherit; display: block;
}
.module-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,.12); border-color: var(--accent); }
.module-card-header {
  height: 8px;
}
.module-card-body { padding: 24px; }
.module-card-body h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
.module-card-body p  { font-size: .85rem; color: var(--text2); line-height: 1.5; }
.module-card-footer {
  padding: 12px 24px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  font-size: .82rem; color: var(--text2);
}
.module-pill {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
  padding: 2px 10px; font-size: .78rem; font-weight: 600;
}
.no-access-msg {
  text-align: center; padding: 60px 20px; color: var(--text2);
}
.no-access-msg svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: .4; }
.signout-btn {
  background: none; border: 1px solid var(--border); color: var(--text2);
  padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: .85rem;
  transition: all var(--transition);
}
.signout-btn:hover { border-color: var(--danger); color: var(--danger); }

/* ===== SPINNER ===== */
.spinner {
  width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite;
  display: inline-block; vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
  .auth-card { padding: 28px 20px; }
  .welcome-banner { padding: 20px; }
  #modules-section { padding: 20px 16px; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a href="#" class="topbar-logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="8" fill="#1a56db"/>
      <text x="7" y="23" font-size="18" font-weight="800" fill="white" font-family="Arial">A</text>
    </svg>
    <span>Academia Ensurity</span>
  </a>
  <div class="topbar-actions">
    <button class="lang-toggle" id="langToggle" onclick="toggleLang()" title="Switch language">EN</button>
    <button class="btn-icon" onclick="toggleTheme()" title="Toggle theme" id="themeBtn">
      <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>
</header>

<!-- AUTH SECTION -->
<section id="auth-section">
  <div class="auth-card">
    <div class="auth-card-logo">
      <h1 id="auth-title">Academia Ensurity</h1>
      <p id="auth-subtitle">Insurance Agent Training Platform</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-signin" onclick="switchTab('signin')" data-en="Sign In" data-es="Iniciar Sesión">Sign In</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')" data-en="Register" data-es="Registrarse">Register</div>
    </div>

    <!-- Sign In Form -->
    <form id="form-signin" onsubmit="doSignIn(event)">
      <div class="form-group">
        <label id="lbl-email-si" data-en="Email" data-es="Correo electrónico">Email</label>
        <input type="email" id="si-email" required autocomplete="email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label id="lbl-pass-si" data-en="Password" data-es="Contraseña">Password</label>
        <input type="password" id="si-password" required autocomplete="current-password" placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn-primary" id="btn-signin">
        <span id="signin-label" data-en="Sign In" data-es="Iniciar Sesión">Sign In</span>
      </button>
      <span class="forgot-link" onclick="switchTab('forgot')" id="forgot-link" data-en="Forgot password?" data-es="¿Olvidaste tu contraseña?">Forgot password?</span>
      <div class="auth-msg" id="msg-signin"></div>
    </form>

    <!-- Register Form -->
    <form id="form-register" onsubmit="doRegister(event)" style="display:none">
      <div class="form-group">
        <label data-en="Full Name" data-es="Nombre completo" id="lbl-name">Full Name</label>
        <input type="text" id="reg-name" required placeholder="John Doe"/>
      </div>
      <div class="form-group">
        <label data-en="Email" data-es="Correo electrónico" id="lbl-email-reg">Email</label>
        <input type="email" id="reg-email" required placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label data-en="Phone" data-es="Teléfono" id="lbl-phone">Phone</label>
        <input type="tel" id="reg-phone" required placeholder="+1 555 000 0000"/>
        <small class="field-hint" data-en="By providing your phone number you agree to receive training-related messages." data-es="Al proporcionar tu teléfono aceptas recibir mensajes relacionados con el entrenamiento.">By providing your phone number you agree to receive training-related messages.</small>
      </div>
      <div class="form-group">
        <label data-en="Course of interest" data-es="Curso de interés" id="lbl-course">Course of interest</label>
        <select id="reg-course">
          <option value="" data-en="-- Select a course --" data-es="-- Selecciona un curso --">-- Select a course --</option>
          <option value="allstate">Allstate Health Solutions</option>
          <option value="american-amicable">American Amicable</option>
          <option value="cica">CICA Citizens</option>
          <option value="undecided" data-en="Not sure yet" data-es="No estoy seguro/a">Not sure yet</option>
        </select>
      </div>
      <div class="form-group">
        <label data-en="Password (min 8 chars)" data-es="Contraseña (mín. 8 caracteres)" id="lbl-pass-reg">Password (min 8 chars)</label>
        <input type="password" id="reg-password" required minlength="8" placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn-primary" id="btn-register">
        <span id="register-label" data-en="Create Account" data-es="Crear Cuenta">Create Account</span>
      </button>
      <div class="auth-msg" id="msg-register"></div>
    </form>

    <!-- Forgot Password Form -->
    <form id="form-forgot" onsubmit="doForgot(event)" style="display:none">
      <div class="form-group">
        <label data-en="Your email address" data-es="Tu correo electrónico" id="lbl-email-fp">Your email address</label>
        <input type="email" id="fp-email" required placeholder="you@example.com"/>
      </div>
      <button type="submit" class="btn-primary">
        <span id="forgot-label" data-en="Send Reset Link" data-es="Enviar enlace">Send Reset Link</span>
      </button>
      <span class="forgot-link" onclick="switchTab('signin')" id="back-signin" data-en="← Back to Sign In" data-es="← Volver">← Back to Sign In</span>
      <div class="auth-msg" id="msg-forgot"></div>
    </form>
  </div>
</section>

<!-- MODULES SECTION (shown after login) -->
<section id="modules-section">
  <div class="welcome-banner">
    <div>
      <h2 id="welcome-name">Welcome back!</h2>
      <p id="welcome-sub">Select a training module to continue</p>
    </div>
    <div class="xp-badge">
      <div class="xp-num" id="xp-display">0</div>
      <div class="xp-label">XP • Level <span id="level-display">1</span></div>
    </div>
  </div>

  <div id="user-topbar-actions" style="display:flex; justify-content:flex-end; margin-bottom:20px; gap:10px;">
    <button class="signout-btn" onclick="doSignOut()" id="signout-btn" data-en="Sign Out" data-es="Cerrar Sesión">Sign Out</button>
  </div>

  <p class="section-title" id="modules-heading" data-en="YOUR MODULES" data-es="TUS MÓDULOS">YOUR MODULES</p>
  <div class="modules-grid" id="modules-grid">
    <!-- Cards injected by JS -->
  </div>
</section>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/supabase-config.js"></script>

<script>
// ===== LANGUAGE & THEME =====
let currentLang  = localStorage.getItem('az_lang')  || 'en';
let currentTheme = localStorage.getItem('az_theme') || 'light';

function applyLang() {
  document.querySelectorAll('[data-en]').forEach(el => {
    el.textContent = currentLang === 'es' ? el.dataset.es : el.dataset.en;
  });
  document.getElementById('langToggle').textContent = currentLang === 'es' ? 'ES' : 'EN';
  document.documentElement.lang = currentLang;
}

function toggleLang() {
  currentLang = currentLang === 'en' ? 'es' : 'en';
  localStorage.setItem('az_lang', currentLang);
  applyLang();
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', currentTheme);
  localStorage.setItem('az_theme', currentTheme);
}

function toggleTheme() {
  currentTheme = currentTheme === 'light' ? 'dark' : 'light';
  applyTheme();
}

// ===== TAB SWITCHING =====
let activeTab = 'signin';
function switchTab(tab) {
  activeTab = tab;
  ['signin','register','forgot'].forEach(t => {
    document.getElementById(`form-${t}`).style.display = t === tab ? 'block' : 'none';
  });
  ['signin','register'].forEach(t => {
    const el = document.getElementById(`tab-${t}`);
    if (el) el.classList.toggle('active', t === tab);
  });
  clearMessages();
}

function clearMessages() {
  document.querySelectorAll('.auth-msg').forEach(m => { m.className = 'auth-msg'; m.textContent = ''; });
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `auth-msg ${type}`;
}

function setLoading(btnId, loading, labelId) {
  const btn = document.getElementById(btnId);
  const lbl = document.getElementById(labelId);
  btn.disabled = loading;
  if (loading) {
    btn.innerHTML = `<span class="spinner"></span>${currentLang === 'es' ? 'Cargando...' : 'Loading...'}`;
  } else {
    btn.innerHTML = `<span id="${labelId}" data-en="${lbl?.dataset?.en || ''}" data-es="${lbl?.dataset?.es || ''}">${currentLang === 'es' ? (lbl?.dataset?.es || '') : (lbl?.dataset?.en || '')}</span>`;
    applyLang();
  }
}

// ===== AUTH ACTIONS =====
async function doSignIn(e) {
  e.preventDefault();
  const email    = document.getElementById('si-email').value.trim();
  const password = document.getElementById('si-password').value;
  clearMessages();
  setLoading('btn-signin', true, 'signin-label');
  try {
    const { profile } = await AZ.Auth.signIn(email, password);
    await showModules(profile);
  } catch (err) {
    const msg = err.message === 'NO_MODULE_ACCESS'
      ? (currentLang === 'es' ? 'No tienes acceso asignado. Contacta a tu administrador.' : 'No module access assigned. Contact your administrator.')
      : (currentLang === 'es' ? 'Email o contraseña incorrectos.' : 'Incorrect email or password.');
    showMsg('msg-signin', msg, 'error');
  } finally {
    setLoading('btn-signin', false, 'signin-label');
  }
}

async function doRegister(e) {
  e.preventDefault();
  const name   = document.getElementById('reg-name').value.trim();
  const email  = document.getElementById('reg-email').value.trim();
  const phone  = document.getElementById('reg-phone').value.trim();
  const pass   = document.getElementById('reg-password').value;
  const course = document.getElementById('reg-course').value;
  clearMessages();
  setLoading('btn-register', true, 'register-label');
  try {
    await AZ.Auth.signUp(email, pass, name, phone, course);
    sendToBitrix({ name, email, phone, course });
    showMsg('msg-register',
      currentLang === 'es'
        ? '¡Cuenta creada! Tu solicitud está pendiente de aprobación. Te notificaremos pronto.'
        : 'Account created! Your request is pending approval. We will notify you soon.',
      'success'
    );
  } catch (err) {
    const msg = err.message?.includes('already registered')
      ? (currentLang === 'es' ? 'Ya existe una cuenta con ese email.' : 'An account with this email already exists.')
      : err.message;
    showMsg('msg-register', msg, 'error');
  } finally {
    setLoading('btn-register', false, 'register-label');
  }
}

async function doForgot(e) {
  e.preventDefault();
  const email = document.getElementById('fp-email').value.trim();
  clearMessages();
  try {
    await AZ.Auth.sendPasswordReset(email);
    showMsg('msg-forgot',
      currentLang === 'es'
        ? 'Enlace enviado. Revisa tu email.'
        : 'Reset link sent. Check your email.',
      'success'
    );
  } catch (err) {
    showMsg('msg-forgot', err.message, 'error');
  }
}

async function doSignOut() {
  await AZ.Auth.signOut();
  document.getElementById('modules-section').style.display = 'none';
  document.getElementById('auth-section').style.display = 'flex';
  switchTab('signin');
}

// ===== MODULE DISPLAY =====
const MODULE_META = {
  'allstate': {
    name:  { en: 'Allstate Health Solutions', es: 'Allstate Health Solutions' },
    desc:  { en: 'Individual & Senior health plans, life products, agent resources.', es: 'Planes individuales y senior, productos de vida, recursos del agente.' },
    color: '#0033A0',
    href:  'modules/allstate/allstate-academy.html',
    pills: { en: ['Health','Life','Senior'], es: ['Salud','Vida','Senior'] },
  },
  'american-amicable': {
    name:  { en: 'American Amicable', es: 'American Amicable' },
    desc:  { en: 'Life insurance products, new business submission, agent manual.', es: 'Productos de vida, nuevos negocios, manual del agente.' },
    color: '#1A3C6E',
    href:  'modules/american-amicable/american-amicable.html',
    pills: { en: ['Life','New Business'], es: ['Vida','Nuevos Negocios'] },
  },
  'cica': {
    name:  { en: 'CICA Citizens', es: 'CICA Citizens' },
    desc:  { en: 'Policyholder portal, claim forms, state approvals, marketing materials.', es: 'Portal de pólizas, formularios de reclamación, aprobaciones por estado.' },
    color: '#2E7D32',
    href:  'modules/cica/cica-citizens-v2.html',
    pills: { en: ['Claims','Contracts','Portal'], es: ['Reclamaciones','Contratos','Portal'] },
  },
};

async function showModules(profile) {
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('modules-section').style.display = 'block';

  const name = profile.full_name || profile.email;
  const greeting = currentLang === 'es' ? `¡Bienvenido, ${name.split(' ')[0]}!` : `Welcome back, ${name.split(' ')[0]}!`;
  document.getElementById('welcome-name').textContent = greeting;
  document.getElementById('xp-display').textContent   = profile.xp || 0;
  document.getElementById('level-display').textContent = profile.level || 1;

  const grid = document.getElementById('modules-grid');
  grid.innerHTML = '';

  // Admins see all; agents see only assigned modules
  let moduleIds = [];
  const isAdmin = ['admin','super_admin'].includes(profile.role);

  if (isAdmin) {
    moduleIds = Object.keys(MODULE_META);
  } else {
    const userMods = await AZ.Modules.getUserModules(profile.id);
    moduleIds = userMods.map(m => m.module_id);
  }

  if (moduleIds.length === 0) {
    grid.innerHTML = `
      <div class="no-access-msg" style="grid-column:1/-1;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <p>${currentLang === 'es' ? 'No tienes módulos asignados aún. Contacta a tu administrador.' : 'No modules assigned yet. Contact your administrator.'}</p>
      </div>`;
    return;
  }

  moduleIds.forEach(moduleId => {
    const meta = MODULE_META[moduleId];
    if (!meta) return;
    const lang = currentLang;
    const pills = (meta.pills[lang] || meta.pills.en).map(p => `<span class="module-pill">${p}</span>`).join(' ');
    const card = document.createElement('a');
    card.className = 'module-card';
    card.href = meta.href;
    card.innerHTML = `
      <div class="module-card-header" style="background:${meta.color}"></div>
      <div class="module-card-body">
        <h3>${meta.name[lang] || meta.name.en}</h3>
        <p>${meta.desc[lang] || meta.desc.en}</p>
      </div>
      <div class="module-card-footer">
        <div style="display:flex;gap:6px;flex-wrap:wrap">${pills}</div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>`;
    grid.appendChild(card);
  });

  if (isAdmin) {
    const adminCard = document.createElement('a');
    adminCard.className = 'module-card';
    adminCard.href = 'admin/admin-panel.html';
    adminCard.style.borderColor = '#7c3aed';
    adminCard.innerHTML = `
      <div class="module-card-header" style="background:#7c3aed"></div>
      <div class="module-card-body">
        <h3>${currentLang === 'es' ? 'Panel de Administración' : 'Admin Panel'}</h3>
        <p>${currentLang === 'es' ? 'Gestiona usuarios, módulos, actividad y rankings.' : 'Manage users, modules, activity and rankings.'}</p>
      </div>
      <div class="module-card-footer">
        <span class="module-pill">Admin</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>`;
    grid.appendChild(adminCard);
  }
}

(async () => {
  applyLang();
  applyTheme();

  // Pre-fill form from URL params (Bitrix link: ?name=...&email=...&phone=...)
  const params = new URLSearchParams(location.search);
  if (params.get('name') || params.get('email') || params.get('phone')) {
    if (params.get('name'))  document.getElementById('reg-name').value  = params.get('name');
    if (params.get('email')) document.getElementById('reg-email').value = params.get('email');
    if (params.get('phone')) document.getElementById('reg-phone').value = params.get('phone');
    switchTab('register');
  }

  // Check for existing session
  try {
    const current = await AZ.Auth.getCurrentUser();
    if (current) {
      await showModules(current.profile);
    }
  } catch (_) {
    // No session — show auth
  }
})();
